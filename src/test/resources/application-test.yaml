spring:
  datasource:
    url: ${FAC_TEST_DATASOURCE_URL:jdbc:postgresql://localhost:25432/fac_test}
    username: ${FAC_TEST_DATASOURCE_USERNAME:postgres}
    password: ${FAC_TEST_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: Esquema FAC anterior ao Flyway
    clean-disabled: true

fac:
  test-database:
    destructive-operations-enabled: true
