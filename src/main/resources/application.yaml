spring:
  application:
    name: fac
  #  profiles:
  #    active: production
  # SPRING PROFILES_ACTIVE=production
  output:
    ansi:
      enabled: always

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:25432/fac}
    username: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
      # ddl-auto: update
    properties:
      hibernate.format_sql: true

  flyway:
    enabled: false

  jackson:
    deserialization:
      fail-on-unknown-properties: true

fac:
  security:
    enabled: ${FAC_SECURITY_ENABLED:true}
    jwt:
      secret: ${FAC_JWT_SECRET:}
      expiration-minutes: ${FAC_JWT_EXPIRATION_MINUTES:60}
  fiscal:
    software-certificate-number: ${FAC_FISCAL_SOFTWARE_CERTIFICATE_NUMBER:9999}
    qr:
      enabled: ${FAC_FISCAL_QR_ENABLED:true}
      # Valor de demonstração para ambiente de desenvolvimento. Em certificação,
      # este campo deve vir dos 4 caracteres legalmente aplicáveis do hash fiscal.
      hash-characters: ${FAC_FISCAL_QR_HASH_CHARACTERS:YhGV}
