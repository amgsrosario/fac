spring:
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: Esquema FAC anterior ao Flyway
    clean-disabled: true

fac:
  security:
    jwt:
      secret: ${FAC_JWT_SECRET}
