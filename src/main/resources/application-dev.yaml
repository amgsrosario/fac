spring:
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:25432/fac}
    username: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: Esquema FAC anterior ao Flyway
